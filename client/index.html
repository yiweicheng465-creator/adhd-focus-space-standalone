<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ADHD Focus Space</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    <!-- Apply saved theme settings synchronously before React hydrates to prevent flash of default colors -->
    <script>
      (function () {
        try {
          // Restore hue rotation
          var hue = parseFloat(localStorage.getItem('adhd-base-hue'));
          if (!isNaN(hue) && hue !== 330) {
            var offset = hue - 330;
            document.documentElement.style.setProperty('--hue-rotate-deg', offset + 'deg');
            document.documentElement.style.setProperty('--base-hue', String(hue));
          }
          // Restore work mode
          if (localStorage.getItem('adhd-work-mode') === 'on') {
            document.documentElement.classList.add('work-mode');
          }
        } catch (e) { /* ignore — localStorage may be unavailable in private mode */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
